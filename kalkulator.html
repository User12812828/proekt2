<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор калорий</title>
    <link rel="stylesheet" href="./css/kalk.css">
    <style>
        body { font-family: Arial, Helvetica, sans-serif; }
        form { width: 300px; margin: 50px auto; }
        label { display: block; margin-bottom: 10px; }
        input[type="number"], select { width: 100%; height: 30px; margin-bottom: 15px; }
        button { background-color:  rgba(168, 255, 111, 1); color: #ffffff; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        .result { margin-top: 20px; font-size: 18px; }
    </style>
</head>
<body>

<h1>Калькулятор калорий</h1>

<form id="calorieCalculatorForm">
    <label for="age">Возраст:</label>
    <input type="number" id="age" placeholder="лет" required />

    <label for="gender">Пол:</label>
    <select id="gender" required>
        <option value="">-- Выберите пол --</option>
        <option value="male">Мужской</option>
        <option value="female">Женский</option>
    </select>

    <label for="height">Рост (см):</label>
    <input type="number" id="height" placeholder="см" required />

    <label for="weight">Вес (кг):</label>
    <input type="number" id="weight" placeholder="кг" required />

    <label for="activityLevel">Уровень активности:</label>
    <select id="activityLevel" required>
        <option value="">-- Уровень активности --</option>
        <option value="sedentary">Низкая активность (сидячий образ жизни)</option>
        <option value="lightlyActive">Легкая активность (умеренная нагрузка 1-3 раза в неделю)</option>
        <option value="moderatelyActive">Средняя активность (регулярные занятия 3-5 раз в неделю)</option>
        <option value="veryActive">Высокая активность (ежедневные интенсивные тренировки)</option>
    </select>

    <button type="submit">Рассчитать</button>
</form>

<div class="result" id="result"></div>

<script src="calculator.js"></script>

</body>
</html>
